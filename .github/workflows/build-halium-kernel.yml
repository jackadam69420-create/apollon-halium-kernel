name: Build Halium Kernel for Apollon

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup build environment
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex \
          g++-multilib gcc-multilib git gnupg gperf imagemagick lib32ncurses5-dev \
          lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev \
          libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync \
          schedtool squashfs-tools xsltproc zip zlib1g-dev python3 python-is-python3 \
          libarchive-tools
    
    - name: Clone kernel source
      run: |
        git clone --depth=1 https://github.com/LineageOS/android_kernel_xiaomi_sm8250.git -b lineage-20.0 kernel
        cd kernel
        echo "Kernel cloned successfully"
    
    - name: Clone toolchain
      run: |
        git clone --depth=1 https://github.com/kdrag0n/proton-clang.git toolchain
        echo "Toolchain ready"
    
    - name: Apply Halium config
      run: |
        cp apollo_halium_defconfig kernel/.config
        cd kernel
        echo "Config applied"
    
    - name: Build kernel
      run: |
        cd kernel
        export ARCH=arm64
        export SUBARCH=arm64
        export CLANG_PATH=$GITHUB_WORKSPACE/toolchain/bin
        export PATH=$CLANG_PATH:$PATH
        export CLANG_TRIPLE=aarch64-linux-gnu-
        export CROSS_COMPILE=aarch64-linux-gnu-
        export CROSS_COMPILE_ARM32=arm-linux-gnueabi-
        export CC=clang
        
        make ARCH=arm64 CC=clang olddefconfig
        make ARCH=arm64 CC=clang -j$(nproc --all) 2>&1 | tee build.log
    
    - name: Clone halium-boot tools
      run: |
        git clone https://github.com/halium/halium-boot.git
    
    - name: Build halium-boot ramdisk
      run: |
        cd halium-boot
        mkdir -p out
        ./build-ramdisk.sh
    
    - name: Create halium-boot.img
      run: |
        pip3 install mkbootimg
        
        mkbootimg \
          --kernel kernel/arch/arm64/boot/Image.gz-dtb \
          --ramdisk halium-boot/out/ramdisk.img \
          --cmdline "androidboot.hardware=qcom console=ttyMSM0 lpm_levels.sleep_disabled=1 service_locator.enable=1 swiotlb=2048 loop.max_part=7" \
          --base 0x00000000 \
          --kernel_offset 0x00008000 \
          --ramdisk_offset 0x01000000 \
          --tags_offset 0x00000100 \
          --pagesize 4096 \
          --os_version 11.0.0 \
          --os_patch_level 2024-10 \
          -o halium-boot.img
        
        ls -lh halium-boot.img
        echo "✅ halium-boot.img created!"
    
    - name: Upload halium-boot.img
      uses: actions/upload-artifact@v3
      with:
        name: halium-boot-apollon
        path: halium-boot.img
    
    - name: Upload build log
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: build-log
        path: kernel/build.log
